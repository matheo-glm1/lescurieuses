<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Les Curieuses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/don.css">
</head>
<body>
<div id="footer-placeholder"></div>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const navbar = document.getElementById('navbar');
    if (navbar) navbar.classList.add('solid');

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Forms
    ['etablissement', 'partenaire', 'intervenir'].forEach(id => {
      const form = document.getElementById('form-' + id);
      const success = document.getElementById('success-' + id);
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          form.style.display = 'none';
          success.style.display = 'block';
        });
      }
    });

    // FAQ accordion
    document.querySelectorAll('.faq-q').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.parentElement;
        const answer = item.querySelector('.faq-a');
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(i => {
          i.classList.remove('open');
          i.querySelector('.faq-a').style.maxHeight = null;
        });
        if (!isOpen) {
          item.classList.add('open');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });

    // Handle hash navigation (e.g. contact.html#partenaire)
    const hash = window.location.hash.replace('#', '');
    if (hash === 'partenaire' || hash === 'intervenir') {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const btn = document.querySelector(`[data-tab="${hash}"]`);
      if (btn) {
        btn.classList.add('active');
        document.getElementById('tab-' + hash).classList.add('active');
      }
    }
  });
</script>
</body>
</html>
